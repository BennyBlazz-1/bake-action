name: demo-ci

on:
  push:
    branches: [main, master]
    paths:
      - 'demo/**'
      - '.github/workflows/demo-ci.yml'
      - 'action.yml'
      - 'src/**'
      - 'dist/**'
  pull_request:
    paths:
      - 'demo/**'
      - '.github/workflows/demo-ci.yml'
      - 'action.yml'
      - 'src/**'
      - 'dist/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-node:
    name: Pruebas unitarias Node
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: demo

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configurar Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: demo/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar pruebas
        run: npm test

  validate-bake:
    name: Validación Bake con el fork
    runs-on: ubuntu-latest
    needs: test-node

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validar configuración Docker Bake usando la acción local del fork
        uses: ./
        with:
          source: ./demo
          files: ./docker-bake.hcl
          targets: validate

  build-smoke:
    name: Build y smoke test
    runs-on: ubuntu-latest
    needs: validate-bake

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Construir imagen local usando la acción del fork
        uses: ./
        with:
          source: ./demo
          files: ./docker-bake.hcl
          targets: local
          set: |
            *.tags=bake-action-demo:${{ github.sha }}

      - name: Ejecutar contenedor
        run: |
          docker run -d --name bake-action-demo -p 3000:3000 bake-action-demo:${{ github.sha }}
          sleep 5
          curl --fail http://127.0.0.1:3000/health

      - name: Mostrar logs del contenedor si falla
        if: failure()
        run: docker logs bake-action-demo

      - name: Detener contenedor
        if: always()
        run: docker rm -f bake-action-demo || true