name: demo-ci

on:
  push:
    branches: [main, master]
    paths:
      - 'demo/**'
      - 'demo-ui/**'
      - '.github/workflows/demo-ci.yml'
      - 'action.yml'
      - 'src/**'
      - 'dist/**'
  pull_request:
    paths:
      - 'demo/**'
      - 'demo-ui/**'
      - '.github/workflows/demo-ci.yml'
      - 'action.yml'
      - 'src/**'
      - 'dist/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-node:
    name: Pruebas unitarias Node
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: demo

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configurar Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: demo/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar pruebas
        run: npm test

  validate-bake:
    name: Validación Bake con el fork
    runs-on: ubuntu-latest
    needs: test-node

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validar configuración Docker Bake usando la acción local del fork
        uses: ./
        with:
          source: ./demo
          files: ./docker-bake.hcl
          targets: validate

  build-smoke:
    name: Build y smoke test
    runs-on: ubuntu-latest
    needs: validate-bake

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Construir imagen local usando la acción del fork
        uses: ./
        with:
          source: ./demo
          files: ./docker-bake.hcl
          targets: local
          set: |
            *.tags=bake-action-demo:${{ github.sha }}

      - name: Ejecutar contenedor
        run: |
          docker run -d --name bake-action-demo -p 3000:3000 bake-action-demo:${{ github.sha }}
          sleep 5
          curl --fail http://127.0.0.1:3000/health

      - name: Mostrar logs del contenedor si falla
        if: failure()
        run: docker logs bake-action-demo

      - name: Detener contenedor
        if: always()
        run: docker rm -f bake-action-demo || true

  publish-ghcr:
    name: Publicar imagen en GHCR
    runs-on: ubuntu-latest
    needs: build-smoke
    if: ${{ github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master') }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Iniciar sesión en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publicar imagen
        uses: docker/build-push-action@v6
        with:
          context: ./demo
          file: ./demo/Dockerfile
          push: true
          tags: |
            ghcr.io/bennyblazz-1/bake-action-demo:latest
            ghcr.io/bennyblazz-1/bake-action-demo:${{ github.sha }}

  prepare-dashboard:
    name: Preparar dashboard visual
    runs-on: ubuntu-latest
    needs: [test-node, validate-bake, build-smoke, publish-ghcr]
    if: ${{ always() && github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Generar sitio estático del dashboard
        env:
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_NAME: ${{ github.workflow }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          SHA: ${{ github.sha }}
          SERVER_URL: ${{ github.server_url }}
          TEST_NODE_RESULT: ${{ needs.test-node.result }}
          VALIDATE_BAKE_RESULT: ${{ needs.validate-bake.result }}
          BUILD_SMOKE_RESULT: ${{ needs.build-smoke.result }}
          PUBLISH_GHCR_RESULT: ${{ needs.publish-ghcr.result }}
        run: |
          mkdir -p _site/data

          cp demo-ui/index.html _site/index.html
          cp demo-ui/styles.css _site/styles.css
          cp demo-ui/app.js _site/app.js
          cp demo-ui/.nojekyll _site/.nojekyll

          GENERATED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > _site/data/latest-run.json <<EOF
          {
            "repository": "${REPOSITORY}",
            "workflow": "${WORKFLOW_NAME}",
            "event": "${EVENT_NAME}",
            "refName": "${REF_NAME}",
            "actor": "${ACTOR}",
            "runId": ${RUN_ID},
            "runNumber": ${RUN_NUMBER},
            "sha": "${SHA}",
            "generatedAt": "${GENERATED_AT}",
            "workflowUrl": "${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}",
            "jobs": [
              {
                "id": "test-node",
                "name": "Pruebas unitarias Node",
                "result": "${TEST_NODE_RESULT}"
              },
              {
                "id": "validate-bake",
                "name": "Validación Bake con el fork",
                "result": "${VALIDATE_BAKE_RESULT}"
              },
              {
                "id": "build-smoke",
                "name": "Build y smoke test",
                "result": "${BUILD_SMOKE_RESULT}"
              }
            ]
          }
          EOF

      - name: Subir artifact de GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy-dashboard:
    name: Desplegar dashboard en GitHub Pages
    runs-on: ubuntu-latest
    needs: prepare-dashboard
    if: ${{ github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master') }}
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4